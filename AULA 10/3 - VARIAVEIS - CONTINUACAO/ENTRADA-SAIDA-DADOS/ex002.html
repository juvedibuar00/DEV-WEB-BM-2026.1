    <script>
        // / Capturando entrada do usuário
const nomeUsuario = prompt("Qual é o seu nome?");
const anoNasc = parseInt(prompt("Ano de nascimento:"));
const idadeCalc = 2025 - anoNasc;

alert(`Olá, ${nomeUsuario}! Você tem ${idadeCalc} anos.`);
console.log("Dados:", { nomeUsuario, idadeCalc });
    </script>
