<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWER AND UPER CASE</title>
</head>
<body>
    

    <script>
        let nome = window.prompt("Digite seu nome: ")
        document.write(`Seu nome tem ${nome.length} caracteres <br>`)
       document.write(`convertendo teu nome em maíuscula fica ${nome.toUpperCase()} <br>`)
       document.write(`convertendo teu nome em minúscula fica ${nome.toLowerCase()} <br>`)


        // document.write("Seu nome em letras minúsculas é: " + nome.toLowerCase() + "<br>")
        // document.write("Seu nome em letras maiúsculas é: " + nome.toUpperCase() + "<br>")   
          
    </script>
</body>
</html>
