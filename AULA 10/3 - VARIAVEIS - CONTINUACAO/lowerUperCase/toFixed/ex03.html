<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toFixed no body</title>
</head>
<body>
    
    <script>
        // usando toFixed dentro do documento HTML
        let numero2 = window.prompt("Digite outro número:   ") // 3.1415926535897932384626433832795
        document.write(`O número digitado foi ${numero2} e arredondado para 2 casas decimais fica ${numero2.toFixed(2)} <br>`)
        document.write(`O número digitado foi ${numero2} e arredondado para 4 casas decimais fica ${numero2.toFixed(4)} <br>`)
        document.write(`O número digitado foi ${numero2} e arredondado para 10 casas decimais fica ${numero2.toFixed(10)} <br>`)
     </script>
</body>
</html>
