    <script>
    //    O que é loop while? O loop "while" é uma estrutura de controle que permite repetir um bloco de código enquanto uma condição for verdadeira. Ele é útil quando não sabemos exatamente quantas vezes o código precisa ser executado, mas queremos continuar repetindo até que uma condição específica seja atendida.


        //  O que é um loop? É uma estrutura de controle que repete um bloco de código enquanto uma condição for verdadeira. O loop "while" é um dos tipos de loops em JavaScript.

        // Sintaxe:
        // while (condição) {
        //   // código a ser executado
        // }
        // Exemplo: Contando de 1 a 5 usando while
        let contador = 1;
        while (contador <= 5) {
        console.log(`Contagem: ${contador}`);
        contador++; // Incrementa o contador para evitar loop infinito
        }
