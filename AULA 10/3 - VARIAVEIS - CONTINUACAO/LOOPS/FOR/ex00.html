<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR</title>
</head>
<body>
    <script>
        // Esta seria a forma de repetir um código 5 vezes sem usar o FOR
        console.log("Fortaleza")
        console.log("Fortaleza")
        console.log("Fortaleza")
        console.log("Fortaleza")
    </script>

    <script>
        // usando o FOR para repetir um código 5 vezes
        for (let i = 0; i < 5; i++) {  
        console.log("Fortaleza")
        }
    </script>
</body>
</html>
