<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOP FOR</title>
</head>
<body>
    <script>
    //   o que é loop for?
    // é uma estrutura de repetição que executa um bloco de código um número específico de vezes.
    // sintaxe:
    // for (inicialização; condição; incremento) {
    //   // código a ser executado
    // }
    // Contando de 1 a 5
        for (let i = 1; i <= 5; i++) {
        console.log(`Contagem: ${i}`);
        }

        // Tabuada do 7
        console.log("--- Tabuada do 7 ---");
        for (let n = 1; n <= 5; n++) {
        console.log(`7 × ${n} = ${7 * n}`);
        }
    </script>
</body>
</html>
