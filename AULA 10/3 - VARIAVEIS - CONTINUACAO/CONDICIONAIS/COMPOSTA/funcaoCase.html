<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASE AND SWITCH</title>
</head>
<body>
    <script>

const diaSemana = 3; // 1=Seg, 2=Ter, 3=Qua...

switch (diaSemana) {
  case 1: console.log("Segunda-feira"); break;
  case 2: console.log("Terça-feira");  break;
  case 3: console.log("Quarta-feira"); break;
  case 4: console.log("Quinta-feira"); break;
  case 5: console.log("Sexta-feira");  break;
  default: console.log("Final de semana! 🎉");
}
    </script>
</body>
</html>
