<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERADOR TERNARIO</title>
</head>
<body>
    <script>

        // Operador ternário: condição ? verdadeiro : falso
const nota = 72;
const status = nota >= 50 ? "Aprovado " : "Reprovado ";
console.log("Status:", status);
    </script>
</body>
</html>
