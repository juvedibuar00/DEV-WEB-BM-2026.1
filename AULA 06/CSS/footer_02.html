<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
}

header {
  background-color: #f1f1f1;
  padding: 10px;
  text-align: center;
}

/* Style the topnav */
ul.topnav {
  display: flex;
  list-style-type: none;
  margin: 0;
  padding: 0;
  background-color: #333333;
}

/* Style links in topnav */
ul.topnav li a {
  display: block;
  color: #f1f1f1;
  padding: 14px 16px;
  text-decoration: none;
}

/* Change color on hover */
ul.topnav li a:hover {
  background-color: #dddddd;
  color: black;
}


/* Style the footer */
/* Deixar footer no fim da janela */
footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  text-align: center;
  background-color: #270e0e;
  padding: 1px;
  color: white;
}
</style>
</head>
<body>

<div>
  <header>
  <h1>CIÊNCIA DA COMPUTAÇÃO/ADS</h1>
</header>
</div>

<ul class="topnav">
  <li><a href="#">Home</a></li>
  <li><a href="#">Notícias</a></li>
  <li><a href="#">Contato</a></li>
  <li><a href="#">Sobre</a></li>
</ul>

<footer>
  <p>Turma DEV WEB BM 2026.1</p>
</body>
</html>
