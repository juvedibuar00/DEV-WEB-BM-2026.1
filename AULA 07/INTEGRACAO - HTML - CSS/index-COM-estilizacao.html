<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Aula Bootstrap</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <header class="bg-dark text-white p-3">
        <div class="container">
            <h1>Meu Site</h1>
            <nav>
                <a href="#" class="text-white me-3" >Home</a>
                <a href="#" class="text-white me-3">Sobre</a>
                <a href="#" class="text-white me-3">Serviços</a>
                <a href="#" class="text-white">Contato</a>
            </nav>
        </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="container mt-4">

        <div class="row">

            <!-- PRINCIPAL -->
            <section class="col-md-8">

                <h2>Bem-vindo</h2>
                <p>Agora com layout moderno usando Bootstrap.</p>

                <h3>Serviços</h3>
                <ul class="list-group mb-4">
                    <li class="list-group-item">Desenvolvimento Web</li>
                    <li class="list-group-item">Design</li>
                    <li class="list-group-item">Consultoria</li>
                </ul>

                <!-- FORM -->
                <h3>Contato</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mensagem</label>
                        <textarea class="form-control"></textarea>
                    </div>

                    <button class="btn btn-primary">Enviar</button>
                </form>

            </section>

            <!-- LATERAL -->
            <aside class="col-md-4">
                <h4>Links úteis</h4>
                <ul class="list-group">
                    <li class="list-group-item">Google</li>
                    <li class="list-group-item">YouTube</li>
                </ul>
            </aside>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-4">
        © 2026 - Meu Site
    </footer>

</body>
</html>
