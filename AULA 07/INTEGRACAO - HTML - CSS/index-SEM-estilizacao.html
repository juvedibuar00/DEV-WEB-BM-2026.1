<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DEV WEB 206.1</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- O que é header
        O elemento <header> é usado para definir a seção de cabeçalho de um documento ou de uma seção. Ele geralmente contém elementos como o título do site, logotipo, menu de navegação e outras informações introdutórias.  É uma parte importante da estrutura de um site, pois ajuda a organizar o conteúdo e a fornecer uma navegação clara para os usuários. 
        -->
        <h1>
            SOMOS ANALÓBICOS
        </h1>
        <nav>
            <!-- O que é nav
            navegação é um elemento HTML usado para definir uma seção de links de navegação em um documento. Ele é geralmente usado para agrupar links que levam a outras páginas ou seções do site, como um menu de navegação. O elemento <nav> ajuda a organizar a estrutura do site e a melhorar a experiência do usuário, facilitando a localização de informações importantes. 
            -->
            <a href="#">Home</a> |
            <a href="#">Sobre</a> |
            <a href="#">Serviços</a> |
            <a href="#">Contato</a>
        </nav>
    </header>

    <hr>

    <!-- MAIN 
    é um elemento HTML usado para definir o conteúdo principal de um documento. É usado para agrupar o conteúdo que é diretamente relacionado ao tema central do site, como artigos, seções de texto, imagens e outros elementos que compõem a parte principal da página. O elemento <main> ajuda a organizar a estrutura do site e a melhorar a acessibilidade, permitindo que os usuários e os mecanismos de busca identifiquem facilmente o conteúdo mais importante da página. 
    -->
    <main>

        <!-- CONTEÚDO -->
        <section>
            <!-- 
            section é um elemento HTML usado para definir uma seção genérica de um documento. Ele é usado para agrupar conteúdo relacionado, como parágrafos, imagens, vídeos e outros elementos que fazem parte de uma mesma seção temática. O elemento <section> ajuda a organizar a estrutura do site e a melhorar a acessibilidade, permitindo que os usuários e os mecanismos de busca identifiquem facilmente as diferentes partes do conteúdo.
            -->
            <h2>Bem-vindo</h2>
            <p>Este é um site exemplo sem CSS.</p>
        </section>

        <section>
            <h2>Serviços</h2>
            <ul>
                <li>Desenvolvimento Web</li>
                <li>Design</li>
                <li>Consultoria</li>
            </ul>
        </section>

        <!-- FORM -->
        <section>
            <h2>Contato</h2>
            <form>
                <label>Nome:</label><br>
                <input type="text"><br><br>

                <label>Email:</label><br>
                <input type="email"><br><br>

                <label>Mensagem:</label><br>
                <textarea></textarea><br><br>

                <button>Enviar</button>
            </form>
        </section>

    </main>

    <hr>

    <!-- ASIDE 
    Elemento HTML usado para definir um conteúdo relacionado, mas separado do conteúdo principal de um documento. Ele é geralmente usado para exibir informações adicionais, como links úteis, anúncios, biografias de autores ou outros conteúdos que complementam o tema central do site. O elemento <aside> ajuda a organizar a estrutura do site e a melhorar a experiência do usuário, permitindo que eles acessem facilmente informações relevantes sem interferir no conteúdo principal. 
    -->
    <aside>
        <h3>Links úteis</h3>
        <ul>
            <li><a href="#">Google</a></li>
            <li><a href="#">YouTube</a></li>
        </ul>
    </aside>

    <hr>

    <!-- FOOTER 
    Elemento HTML usado para definir a seção de rodapé de um documento ou de uma seção. Ele geralmente contém informações como direitos autorais, links para políticas de privacidade, informações de contato e outras informações relacionadas ao site. O elemento <footer> ajuda a organizar a estrutura do site e a fornecer informações importantes para os usuários, além de melhorar a experiência geral do site. 
    -->
    <footer>
        <p>© 2026 - Meu Site</p>
    </footer>

</body>
</html>
